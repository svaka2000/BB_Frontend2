<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="dad-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dad-coral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e85d3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="150" cy="150" r="148" fill="url(#dad-bg)" stroke="url(#dad-coral)" stroke-width="2"/>
  <circle cx="150" cy="150" r="130" fill="none" stroke="#e85d3a" stroke-width="0.5" opacity="0.3"/>
  <!-- Hero section mockup -->
  <rect x="75" y="75" width="150" height="50" rx="8" fill="rgba(232,93,58,0.1)" stroke="#e85d3a" stroke-width="1.5"/>
  <text x="150" y="95" font-family="Arial" font-size="8" font-weight="700" text-anchor="middle" fill="#e85d3a" letter-spacing="1">DOING EXCEPTIONAL DEEDS</text>
  <text x="150" y="110" font-family="Arial" font-size="10" font-weight="800" text-anchor="middle" fill="#fff">Empowering Youth</text>
  <!-- Impact metrics -->
  <rect x="75" y="135" width="45" height="30" rx="5" fill="rgba(232,93,58,0.08)" stroke="#e85d3a" stroke-width="1"/>
  <text x="97" y="152" font-family="Arial" font-size="12" font-weight="800" text-anchor="middle" fill="#e85d3a">500+</text>
  <text x="97" y="161" font-family="Arial" font-size="5" text-anchor="middle" fill="#888">Youth</text>
  <rect x="127" y="135" width="45" height="30" rx="5" fill="rgba(243,156,18,0.08)" stroke="#f39c12" stroke-width="1"/>
  <text x="149" y="152" font-family="Arial" font-size="12" font-weight="800" text-anchor="middle" fill="#f39c12">8+</text>
  <text x="149" y="161" font-family="Arial" font-size="5" text-anchor="middle" fill="#888">Programs</text>
  <rect x="180" y="135" width="45" height="30" rx="5" fill="rgba(232,93,58,0.08)" stroke="#e85d3a" stroke-width="1"/>
  <text x="202" y="152" font-family="Arial" font-size="12" font-weight="800" text-anchor="middle" fill="#e85d3a">4</text>
  <text x="202" y="161" font-family="Arial" font-size="5" text-anchor="middle" fill="#888">Years</text>
  <!-- Program cards -->
  <rect x="75" y="175" width="70" height="30" rx="5" fill="rgba(232,93,58,0.15)" stroke="#e85d3a" stroke-width="1"/>
  <text x="110" y="194" font-family="Arial" font-size="7" font-weight="600" text-anchor="middle" fill="#e85d3a">⚽ Athletics</text>
  <rect x="155" y="175" width="70" height="30" rx="5" fill="rgba(41,128,185,0.15)" stroke="#2980b9" stroke-width="1"/>
  <text x="190" y="194" font-family="Arial" font-size="7" font-weight="600" text-anchor="middle" fill="#2980b9">📚 Advisory</text>
  <!-- Title -->
  <text x="150" y="232" font-family="Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle" fill="url(#dad-coral)">Impact Homepage</text>
  <text x="150" y="250" font-family="Arial, sans-serif" font-size="8" font-weight="400" text-anchor="middle" fill="#9aa0a8" letter-spacing="2">MAIN FEATURE</text>
  <text x="150" y="272" font-family="Arial, sans-serif" font-size="7" font-weight="500" text-anchor="middle" fill="#e85d3a" opacity="0.8" letter-spacing="1">D.A.D. WEBSITE REDESIGN</text>

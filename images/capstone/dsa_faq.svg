<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="dsa-bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12122a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dsa-gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c875;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="150" cy="150" r="148" fill="url(#dsa-bg2)" stroke="url(#dsa-gold2)" stroke-width="2"/>
  <circle cx="150" cy="150" r="130" fill="none" stroke="#d4a853" stroke-width="0.5" opacity="0.3"/>
  <!-- Search bar -->
  <rect x="80" y="80" width="140" height="28" rx="14" fill="none" stroke="#d4a853" stroke-width="2"/>
  <text x="100" y="99" font-size="12" fill="#d4a853">🔍</text>
  <text x="120" y="98" font-family="Arial" font-size="10" fill="#666">Search FAQs...</text>
  <!-- FAQ items -->
  <rect x="80" y="120" width="140" height="22" rx="4" fill="rgba(212,168,83,0.08)" stroke="#d4a853" stroke-width="1"/>
  <text x="90" y="135" font-family="Arial" font-size="8" fill="#e0e4ea">How can I support the DSA?</text>
  <rect x="80" y="148" width="140" height="22" rx="4" fill="rgba(74,144,217,0.08)" stroke="#4a90d9" stroke-width="1"/>
  <text x="90" y="163" font-family="Arial" font-size="8" fill="#e0e4ea">What are the store hours?</text>
  <rect x="80" y="176" width="140" height="22" rx="4" fill="rgba(212,168,83,0.08)" stroke="#d4a853" stroke-width="1"/>
  <text x="90" y="191" font-family="Arial" font-size="8" fill="#e0e4ea">Do I have to be a member?</text>
  <!-- Chat bubble -->
  <circle cx="195" y="205" r="12" fill="#d4a853" opacity="0.2" cy="210"/>
  <text x="195" y="215" font-size="14" text-anchor="middle" fill="#d4a853">💬</text>
  <!-- Title -->
  <text x="150" y="248" font-family="Arial, sans-serif" font-size="16" font-weight="800" text-anchor="middle" fill="url(#dsa-gold2)">Smart FAQ Hub</text>
  <text x="150" y="268" font-family="Arial, sans-serif" font-size="8" font-weight="400" text-anchor="middle" fill="#9aa3b0" letter-spacing="2">SMALL FEATURE</text>
</svg>

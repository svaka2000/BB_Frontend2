<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="dad-bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dad-coral2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e85d3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="150" cy="150" r="148" fill="url(#dad-bg2)" stroke="url(#dad-coral2)" stroke-width="2"/>
  <circle cx="150" cy="150" r="130" fill="none" stroke="#e85d3a" stroke-width="0.5" opacity="0.3"/>
  <!-- Progress bar -->
  <text x="150" y="85" font-family="Arial" font-size="9" font-weight="600" text-anchor="middle" fill="#e85d3a">$12,400 / $20,000</text>
  <rect x="80" y="92" width="140" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="80" y="92" width="87" height="8" rx="4" fill="url(#dad-coral2)"/>
  <!-- Donation tiers -->
  <rect x="72" y="115" width="48" height="45" rx="6" fill="rgba(232,93,58,0.08)" stroke="#e85d3a" stroke-width="1"/>
  <text x="96" y="135" font-family="Arial" font-size="14" font-weight="800" text-anchor="middle" fill="#e85d3a">$25</text>
  <text x="96" y="150" font-family="Arial" font-size="6" text-anchor="middle" fill="#888">Supplies</text>
  <rect x="126" y="115" width="48" height="45" rx="6" fill="rgba(232,93,58,0.08)" stroke="#e85d3a" stroke-width="2"/>
  <text x="150" y="129" font-family="Arial" font-size="5" font-weight="700" text-anchor="middle" fill="#f39c12">POPULAR</text>
  <text x="150" y="145" font-family="Arial" font-size="14" font-weight="800" text-anchor="middle" fill="#e85d3a">$50</text>
  <text x="150" y="156" font-family="Arial" font-size="6" text-anchor="middle" fill="#888">Mentorship</text>
  <rect x="180" y="115" width="48" height="45" rx="6" fill="rgba(232,93,58,0.08)" stroke="#e85d3a" stroke-width="1"/>
  <text x="204" y="135" font-family="Arial" font-size="14" font-weight="800" text-anchor="middle" fill="#e85d3a">$100</text>
  <text x="204" y="150" font-family="Arial" font-size="6" text-anchor="middle" fill="#888">Full Session</text>
  <!-- Donate button -->
  <rect x="95" y="175" width="110" height="24" rx="12" fill="url(#dad-coral2)"/>
  <text x="150" y="191" font-family="Arial" font-size="10" font-weight="700" text-anchor="middle" fill="#fff">Donate Now →</text>
  <!-- Title -->
  <text x="150" y="230" font-family="Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle" fill="url(#dad-coral2)">Donation Flow</text>
  <text x="150" y="250" font-family="Arial, sans-serif" font-size="8" font-weight="400" text-anchor="middle" fill="#9aa0a8" letter-spacing="2">SMALL FEATURE</text>
</svg>

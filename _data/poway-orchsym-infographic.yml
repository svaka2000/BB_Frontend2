  - title: "UI and Process Improvements"
    image: "pso/pso_improvements.png"
    link: "/capstone/pso-website/"
    alt: "Poway Symphony Orchestra"
    keyPoints:
      - "No upcoming concert card above the fold with date and buy tickets button"
      - "Ticket purchase redirects off-site with no warning or context"
      - "Donate banner has no visual separation from the navigation"
      - "Musician recruitment section targets a different audience than homepage visitors"
      - "Social media links are oversized banner images instead of icons"
      - "No clear user journey from arrival to action"
    subtitle: "Where the Site Falls Short and How to Fix It"
    description: "The homepage tries to serve three audiences simultaneously with no prioritization, so none of the three messages land as effectively as they should. The most urgent fix is surfacing a Next Concert card above the fold with a date and direct ticket link. Ticket flow currently sends users off-site without context, which increases abandonment. The donate banner blends into the navigation with no visual hierarchy. Musician recruitment content belongs on a dedicated Musicians page rather than the homepage. Social links should be replaced with small clean icons. A platform migration from Google Sites to Squarespace, Wix, or WordPress would resolve most of these issues structurally."
    tech:
      - "Inline Email Capture Form"
      - "Next Concert Hero Card"
      - "Direct Ticket Deep-Link"
      - "Dismissible Alert Banner"
      - "Dedicated Musicians Page"
    impact:
      - "Surfacing next concert date reduces ticket purchase friction"
      - "Inline email capture replaces hidden subscribe page"
      - "Visible contact card replaces phone number buried in paragraph text"
      - "Rehearsal info moved off homepage reduces audience confusion"
      - "3-concert season calendar gives concertgoers at-a-glance planning"
      - "Platform migration unlocks proper hero sections and mobile layouts"
    status: "Recommendations Pending"
    team:
      - "Michelle Ji, Anishka Sanghvi, Krishna Visvanath"
      - "Priority: Concertgoer Journey"
      - "Priority: Donor Conversion"
      - "Priority: Musician Recruitment Flow"
      
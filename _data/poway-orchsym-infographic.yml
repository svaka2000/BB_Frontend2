  - title: "Core Messaging Analysis"
    image: "pso/pso_messaging.png"
    link: "/capstone/pso-website/"
    alt: "Poway Symphony Orchestra"
    keyPoints:
      - "Site built on Google Sites, a free platform with significant UI limitations"
      - "Core message: credibility, community belonging, and open invitation"
      - "20+ year history and named conductor used to establish legitimacy"
      - "Local identity anchored to Poway Center for the Performing Arts"
      - "501(c)(3) nonprofit status reinforces community service mission"
      - "Three audiences addressed at once with no prioritization"
    subtitle: "What the Site Is Trying to Say"
    description: "The Poway Symphony Orchestra website carries one core message: we are a serious, long-standing, community-rooted orchestra that deserves your attendance, support, and participation. It backs this up with 20+ years of history, a named conductor and music director in John LoPiccolo, approximately 65 semi-professional musicians, and strong geographic ties to San Diego's North County Inland region. The site simultaneously targets three distinct audiences: concertgoers, donors, and prospective musicians. The intent is clear and the content is solid, but all three messages compete for space on a single homepage with no designed user journey."

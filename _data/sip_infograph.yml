  - title: "UI Improvements"
    image: "sip/sip_improvements.jpg"
    link: "https://www.sipoway.com/"
    alt: "Soroptimist International of Poway - Recommended UI Improvements"
    keyPoints:
      - "Empty homepage: add a hero section with Donate, Join, and Get Help buttons"
      - "About Us and Our Mission overlap: merge into a single cohesive About page"
      - "Programs page is a bare link list: add a short description under each program"
      - "Donation button redirects with no context: add a brief message before the link"
      - "Celebration of Courage has no shared branding: embed event details on the main site"
      - "No impact numbers anywhere: add a section showing how many people have been helped"
      - "Contact page is a meeting schedule: split into a contact form and a meetings section"
      - "No news or updates section: a recent activity feed would show the org is active"
    subtitle: "Eight UI Improvements to Better Serve Visitors"
    description: "The current site communicates SIP's mission but does not guide visitors toward taking action. The homepage offers no clear next step for someone who wants to donate, volunteer, or apply for a program. Redundant pages and a programs list with no descriptions make it hard for first-time visitors to understand what the organization offers. The donation experience sends users away from the site without any context. There are no impact figures to build trust with potential donors. Addressing these issues through focused layout and content changes would make the site significantly more effective at turning visitors into supporters and applicants."
    tech:
      - "Hero + CTA Buttons"
      - "Merged About / Mission Page"
      - "Program Cards with Descriptions"
      - "Donation Context Banner"
      - "Embedded Event Info"
      - "Impact Stats Section"
      - "Separate Contact + Meetings Pages"
      - "Recent Activity Feed"
    impact:
      - "Clearer homepage drives higher donor and volunteer conversion"
      - "Merged About page reduces confusion for first-time visitors"
      - "Program descriptions help applicants self-identify before clicking"
      - "Donation context keeps users informed and on-site longer"
      - "Impact stats build credibility and trust with new visitors"
      - "Restructured contact section reduces friction for new inquiries"
      - "News feed signals an active, engaged organization"
    status: "Recommended"
    team:
      - "Anishka Sanghvi"
      - "Michelle Ji"
      - "Krishna Visvanath"

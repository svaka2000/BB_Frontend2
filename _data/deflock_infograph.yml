Title: "DeFlock SD"
Description: "An extension of deflock.org; open, crowd sourced system to map out Automatic License Plate Readers (ALPRs), educate, and provide tools to *resist* the bipartisan push to implement a technofascist surveillance state."

Topics:
  - title: "DeFlock SD"
    image: "capstone/deflock-sd.png"

    subtitle: "Head-Driven Cursor Control Without Installs or Cloud"
    description: "NodCursor is a browser-based accessibility tool that replaces the mouse with head movement and facial gestures. Powered by MediaPipe Tasks Vision, it tracks facial landmarks in real time and maps nose position and brow tilt to cursor coordinates. A Web Worker handles exponential smoothing and gesture signal derivation off the main thread, keeping the UI fluid. A calibration flow lets users define their natural head range and snap it to the viewport. Gesture controls — blink, double-blink, long-blink — trigger click and scroll actions without any hardware beyond a webcam. Built with React, TypeScript, and Vite, the entire stack runs locally in the browser with no accounts, no server, and no data transmission."

# D.A.D. Website Redesign Capstone Infographic
Title: "D.A.D. Website Redesign"
Description: "A comprehensive redesign proposal for the Doing Exceptional Deeds nonprofit website — elevating their digital presence through impact storytelling, a streamlined donation flow, and dedicated program pages."

Topics:
  - title: "Impact-Driven Homepage"
    image: "capstone/dad_homepage.svg"
    link: "/capstone/dad-redesign/"
    alt: "D.A.D. Complete Homepage Redesign with Impact Storytelling"
    keyPoints:
      - "Full-width hero with bold tagline and dual CTAs"
      - "Animated impact metrics bar (youth served, programs, years)"
      - "Visual mission section with icons instead of text walls"
      - "Program spotlight cards with images and descriptions"
      - "Testimonial carousel from families and community"
      - "Prominent donation CTA with impact statements"
    subtitle: "From Text-Heavy to Visually Compelling in 3 Seconds"
    description: "The current D.A.D. homepage has cramped navigation, small fonts, a wall-of-text mission section, and no visible impact metrics. The redesign leads with a full-width hero, animated counters showing youth served and programs offered, visual program cards, a testimonial carousel, and a prominent donation CTA — transforming first impressions from overwhelming to inspiring."
    tech:
      - "Wix Custom Components"
      - "CSS Grid / Flexbox"
      - "Animated Counters JS"
      - "Testimonial Carousel"
      - "Responsive Breakpoints"
      - "SEO Optimization"
    impact:
      - "First impression becomes visually compelling in under 3 seconds"
      - "Impact metrics build immediate credibility with donors"
      - "Clear CTAs guide visitors toward donating or getting involved"
      - "Program cards make discovering initiatives effortless"
      - "Mobile-optimized for 50%+ of visitors on phones"
    status: "Main Feature"
    team:
      - "Neil — Full-Stack Homepage Build"
      - "Moiz — Content Strategy & SEO"
      - "Akhil — UI/UX Design & Components"

  - title: "Donation Flow Redesign"
    image: "capstone/dad_donate.svg"
    link: "/capstone/dad-redesign/"
    alt: "D.A.D. Donation Flow with Impact Visualization"
    keyPoints:
      - "Impact tiers showing what $25, $50, $100, $250, $500 accomplishes"
      - "Community fundraising progress bar to motivate giving"
      - "Pre-set quick donate buttons with custom amount option"
      - "One-click toggle between one-time and monthly donations"
      - "Photo + story section connecting donors to real impact"
    subtitle: "See Exactly How Your Gift Changes Lives"
    description: "Currently the Donate button just redirects to an external payment page with no impact information, no suggested amounts, and no visible recurring option. The new donation page features visual impact tiers, a community progress bar, recurring donation toggle, and a compelling story section — driving higher average gift sizes and donor retention."
    tech:
      - "Wix Payments / PayPal"
      - "Progress Bar Component"
      - "Recurring Donation Logic"
      - "Impact Tier Cards"
    impact:
      - "Donors see exactly how their money helps"
      - "Pre-set amounts reduce decision paralysis"
      - "Recurring toggle can increase lifetime donor value by 5x"
      - "Progress bar creates urgency and social motivation"
      - "Storytelling builds emotional connection that drives giving"
    status: "Small Feature"
    team:
      - "Akhil — Content & Impact Storytelling"
      - "Neil — Payment Integration & Backend"
      - "Moiz — UI Design & Frontend Build"

  - title: "Program Pages & Registration"
    image: "capstone/dad_programs.svg"
    link: "/capstone/dad-redesign/"
    alt: "D.A.D. Dedicated Program Pages with Registration and Gallery"
    keyPoints:
      - "Hero banner with program-specific photo and title"
      - "Overview section with goals, age groups, schedule, location"
      - "Responsive photo gallery with lightbox viewer"
      - "Embedded registration form for easy family sign-ups"
      - "Program-specific FAQ section"
    subtitle: "Discover, Explore, and Register — All in One Place"
    description: "Program details are currently buried in the homepage mission text — no dedicated pages, no photos, no registration forms, and no schedule info. Interested families must call or email just to learn basics. Individual program pages with hero banners, photo galleries, embedded registration forms, and program-specific FAQs make discovery and sign-up self-service."
    tech:
      - "Reusable Page Template"
      - "Lightbox Gallery"
      - "Registration Form Builder"
      - "Email Notifications"
      - "Lazy Loading Images"
    impact:
      - "Families learn about and sign up without calling or emailing"
      - "Photo galleries provide visual proof of impact"
      - "Dedicated pages improve SEO for program searches"
      - "Registration forms reduce admin workload"
      - "Reusable template makes adding new programs easy"
    status: "Small Feature"
    team:
      - "Moiz — Content Gathering & Page Copy"
      - "Akhil — Registration Form & Backend"
      - "Neil — Photo Gallery & Page Template"
